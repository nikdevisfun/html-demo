<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Landscape responsive card</title>
        <link href="./assets/css/style.css" rel="stylesheet" />
    </head>
    <body>
        <div class="container">
            <div class="card__container">
                <article class="card__article">
                    <img src="./assets/images/eberhardgross.jpg" alt="images" class="card__img" />
                    <div class="card__data">
                        <span class="card__description">Vancouver Montains, Canada</span>
                        <h2 class="card__title">The Great Path</h2>
                        <a href="#" class="card__button">Read more</a>
                    </div>
                </article>
                <article class="card__article">
                    <img src="./assets/images/loudspeakerspeak.jpg" alt="images" class="card__img" />
                    <div class="card__data">
                        <span class="card__description">Poon Hill</span>
                        <h2 class="card__title">Starry Night</h2>
                        <a href="#" class="card__button">Read more</a>
                    </div>
                </article>
                <article class="card__article">
                    <img src="./assets/images/luisdelrio.jpg" alt="images" class="card__img" />
                    <div class="card__data">
                        <span class="card__description">Bojcin Forest, Serbia</span>
                        <h2 class="card__title">Path of Peace</h2>
                        <a href="#" class="card__button">Read more</a>
                    </div>
                </article>
            </div>
        </div>
    </body>
</html>
