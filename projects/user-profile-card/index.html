<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>User profile card</title>
        <link rel="shortcut icon" type="image/svg+xml" href="./assets/images/logo.svg" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
            integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link href="./assets/css/style.css" rel="stylesheet" />
    </head>
    <body>
        <div class="profile">
            <div class="profile__card">
                <div class="profile__content">
                    <img
                        src="./assets/images/profile.png"
                        alt="image"
                        class="profile__img"
                    />
                    <div class="profile__data">
                        <h3 class="profile__name">Tyler Grant</h3>
                        <p class="profile__profession">Web Developer</p>
                    </div>
                    <div class="profile__button" id="profile-btn">
                        <i class="ri-menu-2-line profile__menu"></i>
                        <i class="ri-close-large-line profile__close"></i>
                    </div>
                </div>
                <div class="profile__social" id="profile-social">
                    <a href="javascript:void(0);" target="_blank" class="profile__link">
                        <span>
                            <i class="ri-codepen-line"></i>
                        </span>
                    </a>
                    <a href="javascript:void(0);" target="_blank" class="profile__link">
                        <span>
                            <i class="ri-facebook-line"></i>
                        </span>
                    </a>
                    <a href="javascript:void(0);" target="_blank" class="profile__link">
                        <span>
                            <i class="ri-github-line"></i>
                        </span>
                    </a>
                    <a href="javascript:void(0);" target="_blank" class="profile__link">
                        <span>
                            <i class="ri-instagram-line"></i>
                        </span>
                    </a>
                    <a href="javascript:void(0);" target="_blank" class="profile__link">
                        <span>
                            <i class="ri-dribbble-line"></i>
                        </span>
                    </a>
                </div>
            </div>
        </div>
        <script src="./assets/js/main.js"></script>
    </body>
</html>
