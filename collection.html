<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的灵感宇宙 | 收藏夹</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        /* 动态渐变背景，突出玻璃质感 */
        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #ffffff;
            padding: 2rem;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 核心：玻璃拟态 CSS 类 */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            border-radius: 20px;
        }

        /* 页面布局 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* 顶部导航条 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 搜索框样式 */
        .search-bar {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            color: #fff;
            outline: none;
            width: 350px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.8);
        }

        .search-bar:focus {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            width: 400px;
        }

        .btn-add {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-add:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* 收藏卡片网格 */
        .bookmarks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        /* 独立卡片样式 */
        .card {
            padding: 1.8rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: transform 0.4s ease, background 0.4s ease, box-shadow 0.4s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
        }

        .title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .desc {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.6;
            flex-grow: 1;
        }

        .tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tag {
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 1.5rem; }
            .search-bar { width: 100%; }
            .search-bar:focus { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="glass">
        <div class="logo">✨ SparkMarks</div>
        <input type="text" class="search-bar" placeholder="搜索书签或标签..." id="searchInput">
        <button class="btn-add">+ 新增收藏</button>
    </header>

    <div class="bookmarks-grid" id="bookmarkContainer">
        </div>
</div>

<script>
    // 模拟的书签数据
    const bookmarks = [
        { title: "GitHub", desc: "全球最大的开源代码托管平台，开发者必备。", icon: "🐙", url: "https://github.com", tags: ["开发", "代码"] },
        { title: "Dribbble", desc: "发现世界上顶级的UI/UX设计师和创意作品。", icon: "🏀", url: "https://dribbble.com", tags: ["设计", "灵感"] },
        { title: "MDN Web Docs", desc: "Web 开发者的权威文档，HTML、CSS和JavaScript教程。", icon: "📖", url: "https://developer.mozilla.org", tags: ["学习", "前端"] },
        { title: "Vercel", desc: "前端框架和静态站点的极速部署平台。", icon: "▲", url: "https://vercel.com", tags: ["部署", "工具"] },
        { title: "Figma", desc: "基于浏览器的协作式UI设计工具。", icon: "🎨", url: "https://figma.com", tags: ["设计", "效率"] },
        { title: "Stack Overflow", desc: "程序员的问答社区，解决各类技术疑难杂症。", icon: "🔍", url: "https://stackoverflow.com", tags: ["开发", "社区"] }
    ];

    const container = document.getElementById('bookmarkContainer');
    const searchInput = document.getElementById('searchInput');

    // 渲染卡片函数
    function renderBookmarks(data) {
        container.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('a');
            card.href = item.url;
            card.target = "_blank";
            card.className = 'card glass';
            
            // 生成标签HTML
            const tagsHTML = item.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

            card.innerHTML = `
                <div class="card-header">
                    <div class="icon">${item.icon}</div>
                    <div class="title">${item.title}</div>
                </div>
                <div class="desc">${item.desc}</div>
                <div class="tags">${tagsHTML}</div>
            `;
            container.appendChild(card);
        });
    }

    // 初始渲染
    renderBookmarks(bookmarks);

    // 搜索过滤功能
    searchInput.addEventListener('input', (e) => {
        const keyword = e.target.value.toLowerCase();
        const filtered = bookmarks.filter(item => {
            return item.title.toLowerCase().includes(keyword) || 
                   item.desc.toLowerCase().includes(keyword) ||
                   item.tags.some(tag => tag.toLowerCase().includes(keyword));
        });
        renderBookmarks(filtered);
    });
</script>

</body>
</html>
